<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa de Ubicacion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #0d1117; --paper: #f5f0e8; --accent: #c8502a; --muted: #8a8070; }
    html, body { height: 100%; background: var(--ink); font-family: 'DM Mono', monospace; color: var(--paper); overflow: hidden; }
    #header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 18px 28px; display: flex; align-items: baseline; gap: 14px; background: linear-gradient(to bottom, rgba(13,17,23,0.92) 70%, transparent); backdrop-filter: blur(4px); animation: slideDown .6s cubic-bezier(.16,1,.3,1) both; }
    #greeting { font-family: 'DM Serif Display', serif; font-style: italic; font-size: clamp(1.4rem, 3.5vw, 2rem); color: var(--paper); white-space: nowrap; overflow: hidden; border-right: 2px solid var(--accent); width: 0; animation: typewriter 1.4s steps(40, end) .4s forwards, blink .7s step-end 1.8s 4; }
    #coords { font-size: .72rem; letter-spacing: .06em; color: var(--muted); opacity: 0; animation: fadeIn .5s ease 2s forwards; }
    #map { position: fixed; inset: 0; z-index: 0; filter: saturate(.55) contrast(1.1); opacity: 0; animation: fadeIn .8s ease .2s forwards; }
    .pulse-ring { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 0 rgba(200,80,42,.7); animation: pulse 2s infinite; position: relative; }
    .pulse-ring::after { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid var(--accent); opacity: .5; }
    #status { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 1000; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; background: rgba(13,17,23,.85); border: 1px solid rgba(245,240,232,.12); color: var(--muted); padding: 7px 18px; border-radius: 100px; backdrop-filter: blur(8px); opacity: 0; animation: fadeIn .4s ease 1s forwards; }
    @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes typewriter { to { width: 100%; } }
    @keyframes blink { 50% { border-color: transparent; } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(200,80,42,.6); } 70% { box-shadow: 0 0 0 14px rgba(200,80,42,0); } 100% { box-shadow: 0 0 0 0 rgba(200,80,42,0); } }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="header"><div id="greeting">Bienvenido</div><div id="coords">localizando</div></div>
  <div id="status">Obteniendo ubicacion</div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const hour = new Date().getHours();
    const saludo = hour < 12 ? 'Buenos dias' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
    const markerIcon = L.divIcon({ className: '', html: '<div class="pulse-ring"></div>', iconSize: [20,20], iconAnchor: [10,10] });
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude: lat, longitude: lng, accuracy } = pos.coords;
          map.setView([lat, lng], 14, { animate: true, duration: 1.4 });
          L.marker([lat, lng], { icon: markerIcon }).addTo(map);
          document.getElementById('greeting').textContent = saludo + ' - aqui estas';
          document.getElementById('coords').textContent = lat.toFixed(5) + ', ' + lng.toFixed(5);
          document.getElementById('status').textContent = 'Precision aprox. ' + Math.round(accuracy) + ' m';
        },
        err => {
          document.getElementById('greeting').textContent = saludo + ', viajero';
          document.getElementById('coords').textContent = 'ubicacion no disponible';
          document.getElementById('status').textContent = 'Permiso de ubicacion denegado';
          map.setView([-2.1894, -79.8891], 12, { animate: true });
          L.marker([-2.1894, -79.8891], { icon: markerIcon }).addTo(map);
        },
        { enableHighAccuracy: true, timeout: 8000 }
      );
    }
  </script>
</body>
</html>
